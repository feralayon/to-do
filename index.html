<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager - Organizador de Tareas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="contenedor-principal-de-la-aplicacion">
    <h1>📝 Task Manager</h1>

    <p class="texto-descriptivo-de-la-aplicacion">
      Organiza tus tareas de forma simple.
    </p>

    <div class="tarjeta-del-formulario-de-creacion-de-tareas">
      <h2>Nueva tarea</h2>

      <div class="contenedor-de-campos-del-formulario">
        <input
          type="text"
          id="campoTextoTarea"
          placeholder="Escribe una tarea"
        >

        <select
          id="selectorCategoria"
          onchange="mostrarUOcultarCampoOtraCategoria()"
        >
          <option value="">Selecciona una categoría</option>
          <option value="💼 Trabajo">💼 Trabajo</option>
          <option value="📚 Estudio">📚 Estudio</option>
          <option value="🏠 Personal">🏠 Personal</option>
          <option value="🔴 Urgente">🔴 Urgente</option>
          <option value="other">Otra...</option>
        </select>

        <input
          type="text"
          id="campoOtraCategoria"
          placeholder="Escribe tu categoría"
          <!--style="display: none;"
          -->

        <button id="botonAgregarTarea">Agregar tarea</button>
      </div>

      <div
        id="mensajeError"
        class="contenedor-del-mensaje-de-error-del-formulario"
      ></div>
    </div>

    <div class="barra-superior-de-informacion-y-acciones">
      <p>
        ✅ <span id="numeroTareasCompletadas">0</span>
        de
        <span id="numeroTotalTareas">0</span>
        tareas completadas
      </p>

      <button
        onclick="eliminarTodasLasTareasCompletadas()"
        class="boton-para-limpiar-tareas-completadas"
      >
        Limpiar completadas
      </button>
    </div>

    <div class="tarjeta-de-la-lista-visual-de-tareas">
      <h2>Lista de tareas</h2>
      <ul id="listaVisualDeTareas"></ul>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
